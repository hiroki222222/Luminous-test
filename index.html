<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水回りリフォーム｜福岡の地域密着インフラ・ガス設備会社</title>
<meta name="description" content="福岡県の水回りリフォーム専門。キッチン・トイレ・浴室・洗面台の交換・修理を最短即日対応。地域密着30年の実績と信頼。まずは無料相談から。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
  /* ===== CSS変数 ===== */
  :root {
    --navy:    #0D1F3C;
    --navy2:   #172B50;
    --accent:  #E8500A;
    --accent-l:#FF6B2B;
    --gold:    #C5A059;
    --white:   #FFFFFF;
    --offwhite:#F8F9FA;
    --gray:    #4B5563;
    --lightgray:#E5E7EB;
    --text:    #1A1A1A;
    --green:   #25D366;
    --radius:  4px;
    --shadow:  0 10px 40px rgba(0,0,0,0.15);
  }

  /* ===== リセット ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--white);
    color: var(--text);
    font-size: 16px;
    line-height: 1.8;
    overflow-x: hidden;
  }
  a { text-decoration: none; color: inherit; transition: 0.3s; }

  /* ===== ユーティリティ ===== */
  .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 80px 0; }
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .section-label::before { content: ""; width: 40px; height: 1px; background: var(--accent); }
  .section-title {
    font-size: clamp(26px, 5vw, 36px);
    font-weight: 900;
    line-height: 1.4;
    color: var(--navy);
    margin-bottom: 24px;
  }
  .section-title span { color: var(--accent); }
  .divider { width: 60px; height: 4px; background: var(--accent); margin-bottom: 32px; }

  /* ===== 固定CTA（修正ポイント） ===== */
  .fixed-cta {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    box-shadow: var(--shadow);
  }
  .fixed-cta a {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px; /* 絵文字との間隔 */
    padding: 22px 10px;
    font-size: 17px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .cta-tel { background: var(--accent); } /* 電話は注意を引くオレンジ */
  .cta-line { background: var(--green); }
  .cta-emoji { font-size: 1.2em; }

  /* ===== ヘッダー ===== */
  .site-header {
    background: rgba(255,255,255,0.98);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 900;
    border-bottom: 1px solid var(--lightgray);
  }
  .logo-text { font-weight: 900; font-size: 18px; color: var(--navy); }
  .logo-text span { font-size: 11px; font-weight: 500; display: block; color: var(--gray); letter-spacing: 0.05em; }
  .header-tel { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; color: var(--navy); }

  /* ===== ヒーロー ===== */
  .hero {
    background: var(--offwhite);
    padding: 100px 0 140px;
    position: relative;
    overflow: hidden;
  }
  .hero-headline {
    font-size: clamp(34px, 8vw, 68px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 32px;
    color: var(--navy);
  }
  .hero-headline span {
    background: linear-gradient(90deg, var(--accent), var(--accent-l));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-sub { font-size: 18px; color: var(--gray); margin-bottom: 40px; max-width: 620px; }

  /* ===== 実績数値 ===== */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--lightgray);
    border: 1px solid var(--lightgray);
    margin-top: 60px;
  }
  .stat-item {
    background: #fff;
    padding: 40px 20px;
    text-align: center;
  }
  .stat-num { font-family: 'Oswald', sans-serif; font-size: 48px; font-weight: 600; color: var(--navy); line-height: 1; margin-bottom: 8px; }
  .stat-label { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }

  /* ===== アニメーション ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  @media (min-width: 768px) {
    .stat-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-text">
    福岡水回り再生LAB
    <span>運営：○○インフラ設備株式会社</span>
  </div>
  <div class="header-tel">0120-000-000</div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <div class="section-label">FUKUOKA REGION PRIDE</div>
      <h1 class="hero-headline">
        水回りの<span>課題</span>を<br>品質で解決する。
      </h1>
      <p class="hero-sub">
        福岡で30年。熟練の技術者が24時間365日、<br>
        あなたの住まいの安心を最優先で守り抜きます。
      </p>
      <div class="divider"></div>
      
      <div class="stat-grid fade-up">
        <div class="stat-item">
          <div class="stat-label">RESULTS</div>
          <div class="stat-num">1,200+</div>
          <p style="font-size: 12px; color: var(--gray);">施工実績（件）</p>
        </div>
        <div class="stat-item">
          <div class="stat-label">SATISFACTION</div>
          <div class="stat-num">98.3%</div>
          <p style="font-size: 12px; color: var(--gray);">顧客満足度</p>
        </div>
        <div class="stat-item">
          <div class="stat-label">HISTORY</div>
          <div class="stat-num">30</div>
          <p style="font-size: 12px; color: var(--gray);">地域密着（年）</p>
        </div>
        <div class="stat-item">
          <div class="stat-label">WARRANTY</div>
          <div class="stat-num">10</div>
          <p style="font-size: 12px; color: var(--gray);">施工保証（年）</p>
        </div>
      </div>
    </div>
  </section>

  </main>

<footer style="background: var(--navy); color: #fff; padding: 60px 24px 140px; text-align: center;">
  <p style="font-weight: 700; font-size: 18px; margin-bottom: 12px;">○○インフラ設備株式会社</p>
  <p style="font-size: 12px; opacity: 0.5;">© 2026 hiroki222222</p>
</footer>

<div class="fixed-cta">
  <a href="tel:0120000000" class="cta-tel">
    <span class="cta-emoji">📞</span> お電話での相談
  </a>
  <a href="#" class="cta-line">
    <span class="cta-emoji">💬</span> LINEでの相談
  </a>
</div>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
</body>
</html>
